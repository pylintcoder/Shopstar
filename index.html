<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopstar E-commerce</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        h1, h2, h3 {
            margin: 0;
            padding: 10px 0;
        }
        /* Responsive Styles */
        @media (min-width: 2560px) {
            body {
                font-size: 24px;
            }
        }
        @media (min-width: 1200px) and (max-width: 2560px) {
            body {
                font-size: 20px;
            }
        }
        @media (min-width: 768px) and (max-width: 1199px) {
            body {
                font-size: 18px;
            }
        }
        @media (min-width: 600px) and (max-width: 767px) {
            body {
                font-size: 16px;
            }
        }
        @media (min-width: 480px) and (max-width: 599px) {
            body {
                font-size: 14px;
            }
        }
        @media (max-width: 480px) {
            body {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to Shopstar</h1>
        <h2>Your one-stop shop for all things e-commerce</h2>
        <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>
        <!-- Add more e-commerce functionality here -->
    </div>
</body>
</html>
